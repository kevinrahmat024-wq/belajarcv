<!DOCTYPE html>
<html>
<head>
    <title>AR Alternatif Tanpa ARCore - Mobil Ferrari</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-assets>
            <a-asset-item id="ferrari-model" src="assets/ferrari.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-gltf-model 
                src="#ferrari-model" 
                position="0 0 0" 
                scale="0.5 0.5 0.5" 
                animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
            </a-gltf-model>
            
        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
