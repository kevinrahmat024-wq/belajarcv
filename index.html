<!DOCTYPE html>
<html>
<head>
    <title>AR Alternatif - Mobil Ferrari</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-assets>
            <a-asset-item id="model-ferrari" src="ferrari.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            
            <a-entity gltf-model="#model-ferrari"
                      scale="0.05 0.05 0.05"
                      position="0 0 0"
                      rotation="0 0 0"
                      animation="property: position; from: 0 0 1; to: 0 0 -1; dir: alternate; dur: 2000; loop: true; easing: linear">
            </a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
